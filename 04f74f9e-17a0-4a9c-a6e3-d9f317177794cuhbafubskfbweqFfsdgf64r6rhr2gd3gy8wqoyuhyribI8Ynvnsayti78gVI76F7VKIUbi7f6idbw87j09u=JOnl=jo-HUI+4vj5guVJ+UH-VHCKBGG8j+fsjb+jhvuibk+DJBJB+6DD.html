<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.form-card {
    background: #fff;
    padding: 25px;
    width: 100%;
    max-width: 420px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(15px);}
    to {opacity: 1; transform: translateY(0);}
}

h3 {
    text-align: center;
    margin-bottom: 20px;
    color: #333;
}

.input-group {
    margin-bottom: 15px;
    position: relative;
}

label {
    font-size: 14px;
    font-weight: 500;
    color: #555;
    display: block;
    margin-bottom: 5px;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ddd;
    font-size: 14px;
    transition: 0.3s;
}

input:focus, select:focus, textarea:focus {
    border-color: #4facfe;
    outline: none;
    box-shadow: 0 0 5px rgba(79,172,254,0.5);
}

input { text-transform: uppercase; }

button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #007bff, #00c6ff);
    border: none;
    color: #fff;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

button:disabled {
    background: #aaa;
    cursor: not-allowed;
}

.back-btn {
    display: inline-block;
    margin-top: 10px;
    text-align: center;
    width: 100%;
    padding: 10px;
    background: #ff4d4d;
    color: #fff;
    border-radius: 6px;
    text-decoration: none;
}

#responseMessage {
    margin-top: 15px;
    text-align: center;
    font-weight: 500;
}

.success { color: green; }
.error { color: red; }

/* 🔹 Suggestion box */
#idSuggestions {
    border:1px solid #ddd;
    border-top:none;
    max-height:120px;
    overflow-y:auto;
    display:none;
    background:#fff;
    position:absolute;
    width:100%;
    z-index:1000;
}

#idSuggestions div:hover {
    background:#f1f1f1;
}
</style>
</head>

/* 🔹 Search logic */
empInput.addEventListener('input', function () {
    const value = this.value.toUpperCase();

    if (value.length < 2) {
        suggestionBox.style.display = "none";
        return;
    }

    const filtered = employees.filter(emp => emp.id.includes(value));

    suggestionBox.innerHTML = "";

    if (filtered.length === 0) {
        suggestionBox.style.display = "none";
        return;
    }

    filtered.forEach(emp => {
        const div = document.createElement('div');
        div.style.padding = "8px";
        div.style.cursor = "pointer";
        div.innerText = emp.id;

        div.addEventListener('click', () => {
            empInput.value = emp.id;
            nameInput.value = emp.name;
            suggestionBox.style.display = "none";
        });

        suggestionBox.appendChild(div);
    });

    suggestionBox.style.display = "block";
});

/* Hide dropdown */
document.addEventListener('click', function(e) {
    if (!e.target.closest('.input-group')) {
        suggestionBox.style.display = "none";
    }
});

/* 🔹 Existing Submit */
form.addEventListener('submit', function(e) {
    e.preventDefault();

    submitButton.disabled = true;
    submitButton.innerText = "Submitting...";

    const formData = new FormData(form);

    fetch('https://script.google.com/macros/s/AKfycbxcuua4R0w7XUjmkKAnz7YN-tkqAFXR2fzXF12DbGSr0Rwaiaa8YZdQT31H1kxKsSEQ/exec', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.status === 'success') {
            responseMessage.innerText = "✅ " + data.message;
            responseMessage.className = "success";
            form.reset();
        } else {
            responseMessage.innerText = "❌ " + data.message;
            responseMessage.className = "error";
        }
    })
    .catch(() => {
        responseMessage.innerText = "❌ Submission failed!";
        responseMessage.className = "error";
    })
    .finally(() => {
        submitButton.disabled = false;
        submitButton.innerText = "Submit";
    });
});
</script>
