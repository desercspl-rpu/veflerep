<!DOCTYPE html>
<html>
<head>
  <title>Police Verification</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; min-height: 100vh; background: linear-gradient(120deg, #0f2027, #203a43, #2c5364); display: flex; justify-content: center; align-items: center; padding: 14px; }
    .container { width: 100%; max-width: 440px; padding: 25px; border-radius: 20px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 10px 40px rgba(0,0,0,0.4); color: #fff; }
    h2 { text-align: center; margin-bottom: 20px; font-weight: 600; font-size: 24px; }
    label { font-size: 13px; opacity: 0.85; display: block; margin-top: 12px; }
    input { width: 100%; padding: 14px; margin-top: 6px; border-radius: 12px; border: none; outline: none; background: rgba(255,255,255,0.15); color: #fff; font-size: 16px; }
    input:focus { background: rgba(255,255,255,0.25); box-shadow: 0 0 10px rgba(0, 200, 255, 0.5); }
    button { width: 100%; padding: 14px; margin-top: 18px; border-radius: 14px; border: none; background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: 0.3s; min-height: 50px; }
    button:disabled { background: #555 !important; cursor: not-allowed; opacity: 0.6; }
    .card { margin-top: 20px; padding: 15px; border-radius: 15px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); }
    .status-msg { text-align: center; font-size: 18px; font-weight: 600; padding: 20px; margin-top: 10px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px dashed #00c6ff; }
  </style>
</head>
<body>

<div class="container">
  <h2>🔍 Police Verification</h2>
  
  <div id="searchSection">
    <label>Enter Employee ID:</label>
    <input type="text" id="empIdInput" placeholder="Enter Employee ID here..." autocomplete="off">
    <button onclick="verifyProfileState()" id="verifyBtn">Verify</button>
  </div>

  <div id="detailsCard" class="card" style="display:none;">
    <h3 style="margin-top:0;">Verify Details:</h3>
    <div id="infoBlock"></div>
    <button onclick="proceedToApplication()" id="proceedBtn">Continue</button>
  </div>

  <div id="applicationForm" class="card" style="display:none;">
    <label>Registered Mobile Number:</label>
    <input type="tel" id="mobileNum" placeholder="Enter mobile number" maxlength="10">
    
    <label>You can attach PV (Optional):</label>
    <input type="file" id="fileUpload">
    
    <button onclick="dispatchOtpRequest()" id="sendOtpBtn">Send OTP</button>
  </div>

  <div id="otpForm" class="card" style="display:none;">
    <label>Enter OTP:</label>
    <input type="text" id="otpToken" placeholder="6digit OTP" maxlength="6">
    <button onclick="validateOtpSubmission()" id="submitOtpBtn">Submit</button>
  </div>

  <div id="terminalStatusBox" class="status-msg" style="display:none;"></div>
</div>

<script>
// Replace with your current deployment execution endpoint URL context string reference link
const API_URL = "https://script.google.com/macros/s/AKfycbx-f15dJApYuUk3SrAGIk3Y_73FyBul8xCCeRBvEIKoIe82xA5HK3QBK-t_yrsR-Urm/exec";
let currentSessionProfile = {};

function updateUiState(btnId, loadingText, isDone) {
  const btn = document.getElementById(btnId);
  if (btn) {
    btn.disabled = !isDone;
    btn.innerText = loadingText;
  }
}

function verifyProfileState() {
  const empId = document.getElementById("empIdInput").value.trim();
  if(!empId) { alert("Employee ID cannot be empty!"); return; }
  
  updateUiState("verifyBtn", "Verifying...", false);
  
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "getEmployeeStatus", empId: empId })
  })
  .then(r => r.json())
  .then(res => {
    updateUiState("verifyBtn", "Verify", true);
    if(res.status === "error") { alert(res.message); return; }
    
    currentSessionProfile = res.profile;
    
    // Evaluate workflows based on the returned state
    if(res.state === "VERIFIED_DONE") {
       showTerminalMessage("Your verification Done!");
       return;
    }
    if(res.state === "SUBMITTED_TO_OFFICE") {
       showTerminalMessage("Your application submitted to office.");
       return;
    }
    
    // Hide verify button / lookups immediately
    document.getElementById("searchSection").style.display = "none";
    document.getElementById("detailsCard").style.display = "block";
    
    document.getElementById("infoBlock").innerHTML = `
      <p><strong>Emp ID:</strong> ${currentSessionProfile.empId}</p>
      <p><strong>Name:</strong> ${currentSessionProfile.name}</p>
      <p><strong>DOB:</strong> ${currentSessionProfile.dob}</p>
      <p><strong>Designation:</strong> ${currentSessionProfile.designation}</p>
      <p><strong>Father Name:</strong> ${currentSessionProfile.father}</p>
      <p><strong>UAN:</strong> ${currentSessionProfile.uan}</p>
      <p><strong>ESIC:</strong> ${currentSessionProfile.esic}</p>
    `;
    
    // Route returning users to their active steps
    if(res.state === "PENDING_OTP") {
       document.getElementById("detailsCard").style.display = "none";
       document.getElementById("otpForm").style.display = "block";
    }
  });
}

function proceedToApplication() {
  document.getElementById("detailsCard").style.display = "none";
  document.getElementById("applicationForm").style.display = "block";
}

function dispatchOtpRequest() {
  const mobile = document.getElementById("mobileNum").value.trim();
  if(mobile.length !== 10 || isNaN(mobile)) { alert("Mobile number must be exactly 10 digits and cannot be empty!"); return; }
  
  const fileInput = document.getElementById("fileUpload");
  const file = fileInput.files[0];
  
  updateUiState("sendOtpBtn", "Verifying...", false);
  
  let payload = {
    action: "submitMobileAndFile",
    empId: currentSessionProfile.empId,
    name: currentSessionProfile.name,
    email: currentSessionProfile.email,
    mobile: mobile
  };
  
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      payload.fileData = e.target.result.split(",")[1];
      payload.mimeType = file.type;
      payload.fileName = file.name;
      transmitStep1(payload);
    };
    reader.readAsDataURL(file);
  } else {
    payload.fileData = ""; payload.mimeType = ""; payload.fileName = "";
    transmitStep1(payload);
  }
}

function transmitStep1(payload) {
  fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
  .then(r => r.json())
  .then(res => {
    updateUiState("sendOtpBtn", "Send OTP", true);
    if(res.status === "success") {
      alert("OTP Sent ✅ Now enter OTP");
      document.getElementById("applicationForm").style.display = "none";
      document.getElementById("otpForm").style.display = "block";
    } else {
      alert(res.message);
    }
  });
}

function validateOtpSubmission() {
  const otp = document.getElementById("otpToken").value.trim();
  if(otp.length !== 6 || isNaN(otp)) { alert("OTP code must be exactly 6 digits and cannot be empty!"); return; }
  
  updateUiState("submitOtpBtn", "Verifying...", false);
  
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "submitOtp", empId: currentSessionProfile.empId, otp: otp })
  })
  .then(r => r.json())
  .then(res => {
    updateUiState("submitOtpBtn", "Submit", true);
    if(res.status === "success") {
      showTerminalMessage("Your application submitted to office.");
    } else {
      alert(res.message);
    }
  });
}

function showTerminalMessage(msg) {
  document.getElementById("searchSection").style.display = "none";
  document.getElementById("detailsCard").style.display = "none";
  document.getElementById("applicationForm").style.display = "none";
  document.getElementById("otpForm").style.display = "none";
  
  const target = document.getElementById("terminalStatusBox");
  target.style.display = "block";
  target.innerText = msg;
}
</script>
</body>
</html>
