<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-attendance: #38bdf8; /* Electric Blue */
            --accent-fleet: #fbbf24; /* Amber Gold */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Header / Brand Identity */
        header {
            padding: 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .brand-logo {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .brand-subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* Main Container: Split UI Grid */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            width: 100%;
        }

        /* Unique Action Cards */
        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 3.5rem 2rem;
            text-align: center;
            text-decoration: none;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Card Hover Effects */
        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Specific Card Themes */
        .card-attendance:hover {
            box-shadow: 0 20px 40px rgba(56, 189, 248, 0.15);
        }

        .card-fleet:hover {
            box-shadow: 0 20px 40px rgba(251, 191, 36, 0.15);
        }

        /* Visual Glowing Backgrounds */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
        }

        .card-attendance::before {
            background: radial-gradient(circle at top right, rgba(56, 189, 248, 0.12), transparent 60%);
        }

        .card-fleet::before {
            background: radial-gradient(circle at top right, rgba(251, 191, 36, 0.12), transparent 60%);
        }

        .card:hover::before {
            opacity: 1;
        }

        /* Icon Styling */
        .icon-wrapper {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
            transition: transform 0.4s ease;
        }

        .card-attendance .icon-wrapper {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-attendance);
        }

        .card-fleet .icon-wrapper {
            background: rgba(251, 191, 36, 0.1);
            color: var(--accent-fleet);
        }

        .card:hover .icon-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        /* Typography Inside Cards */
        .card h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            position: relative;
            z-index: 2;
            letter-spacing: 0.5px;
        }

        .card p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            max-width: 280px;
            position: relative;
            z-index: 2;
            margin-bottom: 2rem;
        }

        /* Dynamic Arrow Action Buttons */
        .action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
        }

        .card-attendance:hover .action-btn {
            background: var(--accent-attendance);
            color: var(--bg-color);
        }

        .card-fleet:hover .action-btn {
            background: var(--accent-fleet);
            color: var(--bg-color);
        }

        /* Responsive Design for Mobile Devices */
        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            header {
                padding: 1.5rem 1rem;
            }

            main {
                padding: 1rem;
                align-items: flex-start;
            }

            .card {
                padding: 2.5rem 1.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="brand-logo">Rajmudra</div>
        <div class="brand-subtitle">Group of companies</div>
    </header>

    <main>
        <div class="dashboard-grid">
            
            <a href="#attendance" class="card card-attendance">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-user-check"></i>
                </div>
                <h2>Attendance</h2>
                <p>Clock in/out, view daily logs, and manage download attendance.</p>
                <div class="action-btn">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

            <a href="#fleet-console" class="card card-fleet">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-truck-fast"></i>
                </div>
                <h2>Fleet Console</h2>
                <p>Track journeys, log running Trip KMs, and update vehicle data.</p>
                <div class="action-btn">
                    <i class="fa-solid fa-arrow-right"></i>
                </div>
            </a>

        </div>
    </main>

</body>
</html>
