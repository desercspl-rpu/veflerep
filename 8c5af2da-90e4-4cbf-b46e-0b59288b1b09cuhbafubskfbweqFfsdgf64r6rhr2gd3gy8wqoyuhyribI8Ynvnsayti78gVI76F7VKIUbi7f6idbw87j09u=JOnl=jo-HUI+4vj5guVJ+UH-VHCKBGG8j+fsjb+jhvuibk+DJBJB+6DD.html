<style>
html, body {
    width: 100%;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    min-height: 100vh;
}

/* make form device-fit */
form {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    box-sizing: border-box;
}

/* input device fit */
.inta {
    margin-bottom: 15px;
    width: 100%;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 16px;
    box-sizing: border-box;
}

h3 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-weight: bold;
}

button {
    background-color: #007bff;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
}

/* popup suggestion box */
#suggestionBox {
    border: 1px solid #ccc;
    background: #fff;
    max-height: 120px;
    overflow-y: auto;
    display: none;
    position: absolute;
    width: calc(100% - 2px);
    z-index: 1000;
}

.suggestion-item {
    padding: 8px;
    cursor: pointer;
}

.suggestion-item:hover {
    background-color: #f0f0f0;
}
</style></head>

const empInput = document.getElementById("emp_id");
const suggestionBox = document.getElementById("suggestionBox");
const nameInput = document.getElementById("emp_name");

// Show suggestions based on last digits
empInput.addEventListener("input", function() {
    const value = this.value.toLowerCase();
    suggestionBox.innerHTML = "";

    if (!value) {
        suggestionBox.style.display = "none";
        return;
    }

    const matches = Object.keys(empData).filter(id =>
        id.toLowerCase().includes(value)
    );

    if (matches.length === 0) {
        suggestionBox.style.display = "none";
        return;
    }

    matches.forEach(id => {
        const div = document.createElement("div");
        div.classList.add("suggestion-item");
        div.textContent = id;

        div.onclick = () => {
            empInput.value = id;
            nameInput.value = empData[id];
            suggestionBox.style.display = "none";
        };

        suggestionBox.appendChild(div);
    });

    suggestionBox.style.display = "block";
});

// Hide on click outside
document.addEventListener("click", function(e){
    if (!e.target.closest("#emp_id")) {
        suggestionBox.style.display = "none";
    }
});
</script>
