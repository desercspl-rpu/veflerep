    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Joining Application</title>
        <style>
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    display: flex;
    justify-content: center;
    min-height: 100vh;  
    margin: 0;
}

h3 {
    text-align: center;
    color: #333;
    margin-bottom: 20px;
}

.inta {
    margin-bottom: 15px;
    width: calc(100%);
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 16px;
    box-sizing: border-box;
}

label {
    display: block;
    margin-bottom: 5px;
    color: #555;
    font-weight: bold;
}

button {
    background-color: #007bff;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    width: 100%;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #0056b3;
}
        </style>

    </head>
    <body>
        <form id="myForm">

            <label for="text">Location:</label>

            <label for="text">PAN Number:</label>

            <input class="inta" type="number" name="reage2" required>

            <label for="text">Remark:</label>
            <textarea class="inta" name="rem" rows="4" cols="50" required></textarea><br><br>

        <button type="submit" id="subm">Submit</button><br><br>
        <a href="https://desercspl-rpu.github.io/veflerep/" style="    background-color: red;
    color: white;
    padding: 12px 20px;
    border: none;
    border-radius: 4px;
    font-size: 16px;
    width: 100px;
    transition: background-color 0.3s ease; text-decoration: none;">Back to Home</a>
    </form>

    <!-- Element to display success/error message -->
    <p id="responseMessage"></p>

    <script>
        const form = document.getElementById('myForm');
        const responseMessage = document.getElementById('responseMessage');
        const submitButton = document.getElementById('subm');


        form.addEventListener('submit', function(e) {
            e.preventDefault(); // Prevent the default form submission

            submitButton.disabled = true;

            // Get the form data
            const formData = new FormData(form);

            // Fetch API to submit data to the Apps Script web app URL
            // REPLACE 'YOUR_WEB_APP_URL' with your deployed Apps Script URL
            fetch('https://script.google.com/macros/s/AKfycbw35BVFhwjEbcQUTUgq5LINOfaWuyvKnHV3fcVv-Qo6BRWpff0yaDOPXjwJ4M80qNF2/exec', {
                method: 'POST',
                body: formData

            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Show success alert
                    alert('Success full: ' + data.message);
                    submitButton.disabled = false;
                    
                    // Clear the form fields using the reset() method

                    form.reset();
                  // Optionally, display a message within the page (instead of alert)
                        responseMessage.style.display = 'block';
                        submitButton.disabled = false;
                } else {
                    // Show error alert
                    alert('Error: ' + data.message);
                    responseMessage.innerHTML = 'Error: ' + data.message;
                    responseMessage.style.color = 'red';
                    submitButton.disabled = false;
                }
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('An error occurred during submission.');
                responseMessage.innerHTML = 'An error occurred during submission.';
                responseMessage.style.color = 'red';
                submitButton.disabled = false;
            });
        });
    </script>
</body>

</html>
